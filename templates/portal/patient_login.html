{% extends "base/base.html" %}

{% block title %}Patient Access - HMS Patient Portal{% endblock %}

{% block extra_css %}
<style>
    .glass-login {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .auth-gradient {
        background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen auth-gradient flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Decorative Elements -->
    <div
        class="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-3xl -mr-48 -mt-48 transition-transform duration-1000">
    </div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-teal-900/10 rounded-full blur-3xl -ml-48 -mb-48"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-2xl mb-6 text-emerald-600">
                <i class="bi bi-person-heart text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight mb-2 uppercase">HMS</h1>
            <p class="text-emerald-50 font-bold tracking-widest uppercase text-xs">Patient Portal</p>
        </div>

        <div class="glass-login rounded-[2.5rem] p-10 shadow-2xl">
            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label
                        class="block text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <div class="relative group">
                        <i
                            class="bi bi-person absolute left-4 top-1/2 -translate-y-1/2 text-emerald-600 transition-colors"></i>
                        <input type="text" name="username" required
                            class="w-full pl-12 pr-4 py-4 bg-white/50 border border-emerald-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none font-medium text-gray-900 placeholder-emerald-300"
                            placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-2 ml-1">Secure
                        Password</label>
                    <div class="relative group">
                        <i
                            class="bi bi-shield-lock absolute left-4 top-1/2 -translate-y-1/2 text-emerald-600 transition-colors"></i>
                        <input type="password" name="password" required
                            class="w-full pl-12 pr-4 py-4 bg-white/50 border border-emerald-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none font-medium text-gray-900 placeholder-emerald-300"
                            placeholder="••••••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center group cursor-pointer">
                        <input type="checkbox" class="hidden peer">
                        <div
                            class="w-5 h-5 border-2 border-emerald-200 rounded-lg mr-3 peer-checked:bg-emerald-600 peer-checked:border-emerald-600 transition-all flex items-center justify-center">
                            <i class="bi bi-check text-white text-xs opacity-0 peer-checked:opacity-100"></i>
                        </div>
                        <span class="text-sm font-bold text-emerald-800">Keep me logged in</span>
                    </label>
                    <a href="#"
                        class="text-sm font-bold text-emerald-700 hover:text-emerald-900 transition-colors">Forgot?</a>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-xl shadow-emerald-700/20 hover:bg-emerald-700 hover:-translate-y-1 active:translate-y-0 transition-all uppercase tracking-widest text-sm">
                    Access My Health Hub
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-emerald-100 text-center">
                <p class="text-sm font-bold text-gray-500">
                    New to the hospital?
                    <a href="{{ url_for('ct1.register_patient') }}"
                        class="text-emerald-600 hover:text-emerald-800 transition-colors">Register here</a>
                </p>
            </div>
        </div>

        <div class="mt-10 flex justify-center space-x-6">
            <a href="{{ url_for('portal.index') }}"
                class="text-emerald-50/70 hover:text-white transition-colors flex items-center text-xs font-black uppercase tracking-widest">
                <i class="bi bi-hospital mr-2"></i> HMS ERP GATEWAY
            </a>
            <span class="text-emerald-50/30">|</span>
            <a href="#"
                class="text-emerald-50/70 hover:text-white transition-colors flex items-center text-xs font-black uppercase tracking-widest">
                <i class="bi bi-headset mr-2"></i> HELP DESK
            </a>
        </div>
    </div>
</div>
{% endblock %}
