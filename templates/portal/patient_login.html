{% extends "base/base.html" %}

{% block title %}Patient Access - HMS Patient Portal{% endblock %}

{% block extra_css %}
<style>
    .glass-login {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }

    .auth-bg {
        background-color: #f8fafc;
        background-image:
            radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
            radial-gradient(at 0% 100%, rgba(20, 184, 166, 0.1) 0px, transparent 50%);
    }

    .noise-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0.2;
        pointer-events: none;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    }

    .floating-blob {
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        opacity: 0.4;
        animation: float 20s infinite alternate;
    }

    @keyframes float {
        from {
            transform: translate(0, 0) scale(1);
        }

        to {
            transform: translate(100px, 100px) scale(1.1);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen auth-bg flex items-center justify-center p-6 relative overflow-hidden font-sans">
    <div class="noise-overlay"></div>

    <!-- Floating Blobs (HMS Uniform) -->
    <div class="floating-blob bg-emerald-200 -top-48 -left-48"></div>
    <div class="floating-blob bg-blue-200 -bottom-48 -right-48" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-xl mb-6 text-emerald-600 border border-gray-100">
                <i class="bi bi-person-heart text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2 uppercase">HMS</h1>
            <p class="text-gray-400 font-bold tracking-[0.3em] uppercase text-[10px]">Patient Portal</p>
        </div>

        <div class="glass-login rounded-[2.5rem] p-10 border border-white/50">
            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Identity
                        Gateway</label>
                    <div class="relative group">
                        <i
                            class="bi bi-person absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-emerald-600 transition-colors"></i>
                        <input type="text" name="username" required
                            class="w-full pl-14 pr-5 py-4 bg-white/50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all outline-none font-medium text-gray-900 placeholder-gray-300 shadow-sm"
                            placeholder="Username">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Secure
                        Key</label>
                    <div class="relative group">
                        <i
                            class="bi bi-shield-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-emerald-600 transition-colors"></i>
                        <input type="password" name="password" required
                            class="w-full pl-14 pr-5 py-4 bg-white/50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all outline-none font-medium text-gray-900 placeholder-gray-300 shadow-sm"
                            placeholder="Password">
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center group cursor-pointer">
                        <input type="checkbox" class="hidden peer">
                        <div
                            class="w-5 h-5 border-2 border-gray-200 rounded-lg mr-3 peer-checked:bg-emerald-600 peer-checked:border-emerald-600 transition-all flex items-center justify-center">
                            <i class="bi bi-check text-white text-xs opacity-0 peer-checked:opacity-100"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-500">Persistent Session</span>
                    </label>
                    <a href="#"
                        class="text-xs font-bold text-emerald-600 hover:text-emerald-700 transition-colors">Forgot
                        Key?</a>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-gray-950 text-white font-black rounded-2xl shadow-xl hover:bg-emerald-600 hover:-translate-y-1 active:scale-95 transition-all uppercase tracking-[0.2em] text-[11px]">
                    Access Health Hub
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-100 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">
                    New Patient?
                    <a href="{{ url_for('ct1.register_patient') }}"
                        class="text-emerald-600 hover:text-emerald-700 transition-colors ml-1">Initialize Account</a>
                </p>
            </div>
        </div>

        <div class="mt-10 flex justify-center items-center space-x-6">
            <a href="{{ url_for('portal.index') }}"
                class="text-gray-400 hover:text-gray-900 transition-colors flex items-center text-[10px] font-black uppercase tracking-[0.2em]">
                <i class="bi bi-shield-shaded mr-2"></i> ERP Gateway
            </a>
            <div class="w-1 h-1 rounded-full bg-gray-200"></div>
            <a href="#"
                class="text-gray-400 hover:text-gray-900 transition-colors flex items-center text-[10px] font-black uppercase tracking-[0.2em]">
                <i class="bi bi-headset mr-2"></i> Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
